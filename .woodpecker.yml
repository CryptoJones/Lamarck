# Codeberg Woodpecker CI mirror of .github/workflows/test.yml.

steps:
  pytest:
    image: python:3.12-slim
    commands:
      - python -m pip install --upgrade pip
      - pip install -e .
      - pytest -q

  mock-pipeline:
    image: python:3.12-slim
    environment:
      PYTHON: python
    commands:
      - python -m pip install --upgrade pip
      - pip install -e .
      - apt-get update && apt-get install -y --no-install-recommends bash
      - bash scripts/eval/run-all.sh lamarck-ci-mock http://stub /dev/null --mock --out-dir ./eval-ci-out
      - test -s ./eval-ci-out/tier1.json
      - test -s ./eval-ci-out/tier2.json
      - test -s ./eval-ci-out/tier3.json
      - test -s ./eval-ci-out/final.json
      - >
        python -c "import json,sys; f=json.load(open('./eval-ci-out/final.json'));
        sys.exit(0 if f['final_score']==57.0 else
        f\"final_score={f['final_score']} expected 57.0\")"
